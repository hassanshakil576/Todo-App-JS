<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon"
        href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTC5EWKiHyp_Bn3hGIl_EqELEYd8PbXSmjqlg&s"
        type="image/x-icon">
    <title>Todo App</title>
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">TO-DO List</h2>
            <div class="mb-4">
                <div class="d-flex justify-content-between mb-2">
                    <span class="fw-semibold">You're Crushing It!</span>
                    <span id="score">0/0</span>
                </div>

                <div class="progress">
                    <div id="progress-bar" class="progress-bar bg-success" style="width:0%">
                    </div>
                </div>

            </div>

            <div class="input-group mb-3">
                <input type="text" id="task-input" class="form-control" placeholder="Enter a task">
                <button id="add-btn" class="btn btn-primary">Add Task</button>
            </div>

            <div class="d-flex justify-content-center gap-2 mb-3">
                <button class="btn btn-outline-primary form-control">All</button>
                <button class="btn btn-outline-warning form-control">Active</button>
                <button class="btn btn-outline-success form-control">Completed</button>
            </div>
            <ul id="task-list" class="list-group">
                <li id="list" class="list-group-item d-flex justify-content-between align-items-center">
                    
                </li>
            </ul>
        </div>
    </div>
    <script src="./app.js"></script>
</body>

</html>
